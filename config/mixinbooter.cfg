# Configuration file

debug {
    # Verify that mixins implement every method of the interfaces they declare (Equivalent to: -Dmixin.checks.interfaces=true). [default: false]
    B:checkInterfaces=false

    # Export transformed classes to the .mixin.out directory (Equivalent to: -Dmixin.debug.export=true). [default: false]
    B:export=false

    # Enable verbose mixin logging (Equivalent to: -Dmixin.debug.verbose=true). [default: false]
    B:verbose=false

    # Fully-qualified class names to trace at load time. When one of these classes is loaded, the
    # call stack that triggered the load is written to logs/mixinbooter.log. Use this to diagnose
    # 'mixin target was loaded too early' problems by finding which code class-loaded the target.
    # Use a single '*' to trace (near) every class load (very verbose). Leave empty to disable.
    # Example: net.minecraft.client.Minecraft [default: ]
    S:watchedClasses <
     >
}


general {
    # Mirror mixin activity into logs/mixinbooter.log. Disable to skip writing that file entirely. [default: true]
    B:auditTrail=true

    # Mixin configurations that should never be loaded.
    # Use this to forcibly disable a broken or unwanted mixin config shipped by any mod. [default: ]
    S:blacklistedConfigs <
     >
}


